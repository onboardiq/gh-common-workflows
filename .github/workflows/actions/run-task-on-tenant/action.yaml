name: 'Run task on tenant'
description: 'Run a task in a given tenant'
inputs:
  name:
    description: "The name of the running job"
    required: true
  project-name:
    description: "The name of the project"
    required: true
    type: string
  env:
    description: "The deployment environment PROD | UAT | DEV"
    required: true
    type: string
  command:
    description: "The command to run"
    required: true
  args:
    description: "A JSON array of arguments to the command"
    required: true
  branch:
    description: "The branch name"
    required: true
  region:
    description: "The region the tenant is in"
    required: true
  doppler:
    description: "Whether the project uses doppler or not"
    required: false
    default: true
  cluster-suffix:
    description: "A suffix to differentiate tenants in the same region"
    required: true
  tenant-name:
    description: "The name of the tenant"
    required: true
  namespace:
    description: "The kubernetes namespace the tenant is in"
    required: true
  stage:
    description: "One of contexts: 'stage' or 'prod'"
    required: true
  dry-run:
    description: "When true, only does a dry run of the deployment"
    required: true
  aws-access-key-id:
    description: "An AWS Access Key ID with sufficient permissions to read from EKS clusters. Leave empty when using role-to-assume."
    required: false
    default: ''
  aws-secret-access-key:
    description: "An AWS Secret Access Key matching the given access key id. Leave empty when using role-to-assume."
    required: false
    default: ''
  aws-session-token:
    description: "An AWS Session Token (present when credentials come from an OIDC-assumed role)"
    required: false
    default: ''
  aws-account-id:
    description: "An AWS Account ID to form ECR URLs from"
    required: true
  gh_pat:
    description: "A GitHub personal access token"
    required: true
  subdir:
    description: "Subdirectory path within a monorepo to scope image tag SHA derivation (e.g. apps/hire)."
    required: false
    default: ''
  repo-name:
    description: "GitHub repository name override for checkout. Defaults to project-name. Set for monorepo services."
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: 'Add masks'
      shell: bash
      run: |
        echo "::add-mask::${{ inputs.aws-access-key-id }}"
        echo "::add-mask::${{ inputs.aws-secret-access-key }}"
        echo "::add-mask::${{ inputs.aws-session-token }}"
        echo "::add-mask::${{ inputs.aws-account-id }}"
        echo "::add-mask::${{ inputs.gh_pat }}"

    - name: 'Set AWS credentials from inputs'
      if: ${{ inputs.aws-access-key-id != '' }}
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ inputs.aws-access-key-id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws-secret-access-key }}
        AWS_SESSION_TOKEN: ${{ inputs.aws-session-token }}
      run: |
        echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" >> $GITHUB_ENV
        echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}" >> $GITHUB_ENV
        if [ -n "${AWS_SESSION_TOKEN}" ]; then
          echo "AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}" >> $GITHUB_ENV
        fi

    - uses: actions/checkout@v4
      with:
        repository: onboardiq/${{ inputs.repo-name || inputs.project-name }}
        ref: ${{ inputs.branch }}
        fetch-depth: 0
        filter: blob:none

    - uses: actions/checkout@v3
      with:
        repository: onboardiq/gh-common-workflows
        path: ./common-workflows
        fetch-depth: 1

    - name: 'Image tag'
      id: image-tag
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
        SUBDIR: ${{ inputs.subdir }}
      run: |
        if [ -n "$SUBDIR" ]; then
          sha=$(git log -n 1 --first-parent --format=%H -- "$SUBDIR")
          if [ -z "$sha" ]; then
            echo "Could not find any commit touching $SUBDIR on $BRANCH"
            exit 1
          fi
        else
          sha=$(git rev-parse HEAD)
        fi
        echo "result=${BRANCH##*/}-${sha::7}" >> $GITHUB_OUTPUT

    - name: 'Install Kubectl'
      id: install-kubectl
      uses: azure/setup-kubectl@v1
      with:
        version: v1.19.0

      # GITHUB_RUN_ID is the unique identifier (id) within a repo
    - name: 'Set the KUBECONFIG'
      shell: bash
      run: |
        echo KUBECONFIG=${RUNNER_TEMP}/kubeconfig_${GITHUB_RUN_ID} >> $GITHUB_ENV

    - name: 'Get the kubeconfig'
      env:
        AWS_DEFAULT_REGION: ${{ inputs.region }}
      shell: bash
      run: |
          # Map stage values (prod/stage) to new cluster naming (production/staging)
          case "${{ inputs.stage }}" in
            prod)  CLUSTER_STAGE="production" ;;
            stage) CLUSTER_STAGE="staging" ;;
            *)     CLUSTER_STAGE="${{ inputs.stage }}" ;;
          esac

          aws eks update-kubeconfig \
          --name x-${CLUSTER_STAGE}-${{ inputs.region }} \
          --alias aws-${{ inputs.region }}-${CLUSTER_STAGE} \
          --kubeconfig ${KUBECONFIG} \
          --region ${{ inputs.region }}

    - name: Write job manifest
      env:
        REGION: ${{ inputs.region }}
        NAMESPACE: ${{ inputs.namespace }}
        PROJECT: ${{ inputs.project-name }}
        COMMAND: ${{ inputs.command }}
        ARGS: ${{ inputs.args }}
        NAME: ${{ inputs.name }}
        AWS_ACCOUNT_ID: ${{ inputs.aws-account-id }}
        TAG: ${{ steps.image-tag.outputs.result }}
        DOPPLER: ${{ inputs.doppler }}
      shell: bash
      run: node common-workflows/.github/workflows/actions/run-task-on-tenant/create-job-manifest.js

    - name: Test job
      shell: bash
      env:
        AWS_DEFAULT_REGION: ${{ inputs.region }}
      run: |
        cat job.json
        kubectl apply -f job.json --dry-run=client

    - name: Apply job
      shell: bash
      env:
        AWS_DEFAULT_REGION: ${{ inputs.region }}
      if: ${{ inputs.dry-run == 'false' }}
      run: kubectl apply -f job.json
